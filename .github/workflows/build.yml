name: Build APK

# Builds the app on every push to the working branches. When main is updated
# it also publishes a GitHub Release named after the app version (read from
# build.gradle.kts) with the APK attached, so the app can be installed straight
# from the releases page. Bump versionName to cut the next release.
on:
  push:
    branches: [testing, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed so the main build can create the release and tag.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build the release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Collect the APK with a friendly name
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk "out/Elendheim-Picture-Editor.apk"

      - name: Upload the APK as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Elendheim-Picture-Editor-APK
          path: out/Elendheim-Picture-Editor.apk

      - name: Publish a release when main is updated
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The version comes straight from the app so the two never drift.
          VERSION="$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts | head -1)"
          TAG="v${VERSION}"
          NAME="Elendheim Picture Editor ${TAG}"

          # Do not re-cut a release for a version that already shipped.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Nothing to do."
            exit 0
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$NAME" \
            --notes "Elendheim Picture Editor is a private, on-device photo editor for Android.

          This app does three things:
          - Adjusts and filters your photos with live sliders and one-tap looks
          - Crops, rotates and resizes with ready-made social presets
          - Saves the result to your gallery as a new file, leaving the original untouched

          Install by downloading the APK below." \
            "out/Elendheim-Picture-Editor.apk#Elendheim Picture Editor ${TAG}.apk"
