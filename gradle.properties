# Give Gradle enough memory and let it run tasks in parallel for faster builds.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX is the modern support library set. Both flags are required by AGP.
android.useAndroidX=true
android.nonTransitiveRClass=true

# Silence the Kotlin style warning for good.
kotlin.code.style=official
